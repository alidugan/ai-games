<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Love Game 💖</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: #4a001f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .bg-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.2);
            font-size: 5rem;
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }
        .bg-heart:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .bg-heart:nth-child(2) { top: 70%; left: 80%; animation-delay: 2s; }
        .bg-heart:nth-child(3) { top: 40%; left: 60%; animation-delay: 4s; font-size: 8rem; }

        @keyframes float {
            0%   { transform: translateY(0px) rotate(0deg); }
            50%  { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.25);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 40px 0 rgba(255, 100, 150, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            text-align: center;
            width: 100%;
            max-width: 450px;
            z-index: 1;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(200, 0, 50, 0.4);
            margin-bottom: 10px;
        }

        p {
            color: #fff;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(200, 0, 50, 0.2);
        }

        textarea {
            width: 100%;
            height: 130px;
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 15px;
            margin-bottom: 15px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #ff0844;
            background: #fff;
        }

        /* Main draw button */
        #drawBtn {
            background: linear-gradient(to right, #ff0844 0%, #ffb199 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 6px 20px rgba(255, 8, 68, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        #drawBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 8, 68, 0.6); }
        #drawBtn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(255, 8, 68, 0.4); }
        #drawBtn:disabled { background: #d3a4b0; box-shadow: none; cursor: not-allowed; transform: none; }

        /* Share link button */
        #shareBtn {
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.6);
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }

        #shareBtn:hover { background: rgba(255, 255, 255, 0.45); transform: translateY(-1px); }
        #shareBtn:active { transform: scale(0.97); }

        /* Copied toast */
        #toast {
            display: none;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #fff;
            background: rgba(255, 8, 68, 0.6);
            border-radius: 20px;
            padding: 6px 16px;
            backdrop-filter: blur(4px);
        }

        #winner-display {
            margin-top: 30px;
            font-size: 1.8rem;
            font-weight: 800;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 6px rgba(150, 0, 30, 0.6);
            padding: 10px;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .spinning {
            animation: pulse 0.1s infinite alternate;
            color: #ffe6eb !important;
        }

        @keyframes pulse {
            0%   { transform: scale(1); }
            100% { transform: scale(1.03); }
        }

        .final-winner {
            background: rgba(255, 255, 255, 0.9);
            color: #ff0844 !important;
            text-shadow: none !important;
            box-shadow: 0 10px 30px rgba(255, 8, 68, 0.3);
            animation: heartbeat 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            border: 2px solid #ff7eb3;
        }

        @keyframes heartbeat {
            0%   { transform: scale(0.5); opacity: 0; }
            50%  { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .heart-icon {
            display: inline-block;
            margin: 0 10px;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.3); }
        }
    </style>
</head>
<body>

    <div class="bg-heart">❤️</div>
    <div class="bg-heart">💕</div>
    <div class="bg-heart">💖</div>

    <div class="container">
        <h1>💖 The Love Game 💖</h1>
        <p>Enter the singles (one name per line):</p>

        <textarea id="namesList">Ali
Elif
Ela
Ada</textarea>

        <button id="drawBtn" onclick="startLoveMatch()">Find True Love!</button>

        <button id="shareBtn" onclick="copyShareLink()">🔗 Copy Shareable Link</button>
        <div id="toast">✅ Link copied! Share it with your friends 💌</div>

        <div id="winner-display">Who will it be?</div>
    </div>

    <script>
        // On page load: read names from URL hash if present
        (function loadFromURL() {
            try {
                const hash = window.location.hash.slice(1); // strip the #
                if (!hash) return;
                const decoded = decodeURIComponent(hash);
                const names = JSON.parse(decoded);
                if (Array.isArray(names) && names.length > 0) {
                    document.getElementById('namesList').value = names.join('\n');
                }
            } catch (e) {
                // Malformed hash — just ignore and use defaults
            }
        })();

        function getNames() {
            return document.getElementById('namesList').value
                .split('\n')
                .map(n => n.trim())
                .filter(n => n.length > 0);
        }

        function copyShareLink() {
            const names = getNames();
            if (names.length < 2) {
                alert("Add at least 2 names before sharing!");
                return;
            }
            const hash = encodeURIComponent(JSON.stringify(names));
            const url = window.location.origin + window.location.pathname + '#' + hash;
            navigator.clipboard.writeText(url).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 3000);
            }).catch(() => {
                // Fallback for browsers that block clipboard API
                prompt("Copy this link:", url);
            });
        }

        function startLoveMatch() {
            const textArea = document.getElementById('namesList');
            const button = document.getElementById('drawBtn');
            const display = document.getElementById('winner-display');

            const names = getNames();

            if (names.length < 2) {
                alert("You need at least TWO people to play the Love Game!");
                return;
            }

            button.disabled = true;
            textArea.disabled = true;

            display.classList.remove('final-winner');
            display.classList.add('spinning');

            let spins = 0;
            const maxSpins = 40;
            const spinSpeedMs = 60;

            const interval = setInterval(() => {
                const p1 = names[Math.floor(Math.random() * names.length)];
                const p2 = names[Math.floor(Math.random() * names.length)];
                display.innerHTML = `${p1} <br><span style="font-size: 1.2rem;">loves</span><br> ${p2}`;
                spins++;

                if (spins >= maxSpins) {
                    clearInterval(interval);

                    let finalP1 = names[Math.floor(Math.random() * names.length)];
                    let finalP2 = names[Math.floor(Math.random() * names.length)];
                    while (finalP1 === finalP2) {
                        finalP2 = names[Math.floor(Math.random() * names.length)];
                    }

                    display.classList.remove('spinning');
                    display.classList.add('final-winner');
                    display.innerHTML = `${finalP1} <br><span class="heart-icon">❤️</span><br> ${finalP2}`;

                    button.disabled = false;
                    textArea.disabled = false;
                }
            }, spinSpeedMs);
        }
    </script>
</body>
</html>
